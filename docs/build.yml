# SSCCS Documentation Build Configuration
# This file externalizes target-specific configurations and exclude patterns.

# Target-specific configurations (optional)
# These settings override defaults for specific targets.
# If a target is not listed here, it will still be built with default settings.
target_config: []

  # Example: target with HTML copy enabled
  # manifesto:
  #   c2pa: false
  #   copy_html: true
  #   copy_pdf: false
  #   copy_md: false
  #   output_dir: false
  #   to: null

# Pre-build commands
# Commands to execute before the build process begins.
#
# Format (dict-style, recommended):
#   _global:                  # Commands always executed once before any target
#     - [executable, arg1, ...]
#   target-name:              # Commands executed only for a specific target
#     - [executable, arg1, ...]
#
# Old format (list-style, still supported for backward compatibility):
#   - [executable, arg1, ...]  # All commands treated as global
#
# If the executable is not found on PATH, the command is silently skipped.
# If a command fails, an error is logged but the main build process continues.
pre_build:
  _global: []

# Post-render commands
# Commands to execute after all targets have been rendered and merged.
#
# Same format as pre_build. Useful for:
#   - Generating hierarchical llms.txt from the output directory structure
#   - Post-processing merged site artifacts
#   - Running validation or aggregation scripts
#
# If the executable is not found on PATH, the command is silently skipped.
# If a command fails, an error is logged but the build is considered successful.
post_render:
  _global: []

# Exclude patterns (gitignore-style)
# Files and directories matching these patterns will be excluded from target discovery.
# Supports:
#   - Glob patterns: **/*.md, **/README.md
#   - Directory patterns: **/_include/, **/*_libs/
#   - Simple patterns: README.md, contributing.md
exclude:
  - "**/*_site/"
  - "**/_llms/"
  - "**/_publish/"
  - "**/README.md"
  - "**/*.llms.md"
  - "**/llms.txt"

  # Directory patterns (trailing slash indicates directory)
  - "**/_include/"
  - "**/_extensions/"
  - "**/_utils/"
  - "**/*_output/"
  - "**/*_files/"
  - "**/*_cached/"
  - "**/*_libs/"
  - "**/*_pages/"
  - "**/.jupyter_cache"
