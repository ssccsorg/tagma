format:
  html:
    default-figure-format: "svg"
    fig-format: "svg"
    embed-resources: false
    self-contained-math: false
    minimal: true
    theme: minimal
    toc: true
    toc-title: "Contents"
    font-size: 11pt
    page-layout: full
    code-overflow: wrap
    include-in-header:
      text: |
        <style>
        a {
            text-decoration: none !important;
        }
        img {
            max-width: 100%;
        }
        body.nav-sidebar #title-block-header {
            margin-block-end: 1em !important;
        }
        </style>
    format-links: true
    execute:
        eval: true
        echo: false