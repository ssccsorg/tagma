name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "sw/rust/**"
      - "run.sh"
      - ".github/workflows/*.yml"
      - "!sw/rust/**/*.md"
      - "!**/*.qmd"
  pull_request:
    branches: ["main"]
    paths:
      - "sw/rust/**"
      - "run.sh"
      - ".github/workflows/*.yml"
      - "!sw/rust/**/*.md"
      - "!**/*.qmd"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sw/rust
      - name: Full pipeline (fmt, clippy, build, test, no_alloc)
        run: bash run.sh --check

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sw/rust
      - name: Build + test + core benchmarks
        run: bash run.sh --bench

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sw/rust
      - name: Build API docs
        run: bash run.sh --doc
