name: Build Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/test.yml"
      - "!docs/README.md"
      - "!docs/index.html"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/test.yml"
      - "!docs/README.md"
      - "!docs/index.html"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs"
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install Python dependencies
        run: |
          pip install jupyter matplotlib numpy 2>&1

      - name: Render whitepaper
        working-directory: docs
        run: quarto render wp.qmd --to pdf 2>&1

      - name: Render tagma-id
        working-directory: docs
        run: quarto render tagma-id.qmd --to pdf 2>&1
